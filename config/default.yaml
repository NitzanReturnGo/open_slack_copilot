# Secrets are loaded from .env — see Configuration section in README.
# Env vars: SLACK_BOT_TOKEN, SLACK_APP_TOKEN, OPENAI_API_KEY
# General debug: also ``DEBUG=true`` (or 1/yes) in the environment. Dynaconf: ``SLACK_COPILOT_DEBUG=true``.
debug: false

# User data: key-value collections; default file layout ``~/.open_slack_copilot/<collection>/<key>.json``
data_layer:
  root: "~/.open_slack_copilot"
  backend: "file"

slack_bot:
  token: "@format {env[SLACK_BOT_TOKEN]}"
  app_token: "@format {env[SLACK_APP_TOKEN]}"
  # Used only by ``python -m core.slack_user_oauth_server`` (localhost user OAuth).
  user_oauth:
    client_id: "@format {env[SLACK_CLIENT_ID]}"
    client_secret: "@format {env[SLACK_CLIENT_SECRET]}"
    redirect_uri: "http://127.0.0.1:8765/slack/oauth/callback"
    bind_host: "127.0.0.1"
    bind_port: 8765
    # Slack user_scope (comma-separated in authorize URL). Minimal for thread + DM as the user.
    user_scopes:
      - "chat:write"
  # For @mentions and the message shortcut on a channel-root post (no thread), use this many recent channel messages as context.
  copilot_channel_context_limit: 30
  # Prior agent log lines injected into compose_system_prompt (per thread).
  llm_action_history_limit: 10
  block_kit_plain_text_chunk: 3000
  block_kit_max_body_blocks: 48
  private_metadata_limit: 3000
  button_value_limit: 2000

scheduled_prompts:
  storage_path: "~/.open_slack_copilot/scheduled_prompts"
  max_expiry_days: 14
  default_expiry_days: 7

llm:
  # Completion backend: openai (default) | anthropic (stub until implemented).
  provider: "openai"
  model: "gpt-4o"
  openai_api_key: "@format {env[OPENAI_API_KEY]}"
  # Used when provider is anthropic (not wired yet).
  anthropic_api_key: "@format {env[ANTHROPIC_API_KEY]}"
  max_tool_rounds: 24
  max_tool_result_preview: 600

log_sanitize:
  max_str: 500
  max_list: 8
  max_depth: 12

cache:
  filename_max: 200
  value_segment_max: 120

agent_log:
  agent_logs_dir: "agent_logs"
  global_log_filename: "llm_actions.log"
  max_tool_snippet: 600
  max_tool_preview_in_log: 400
  short_final_skip_summary_llm_chars: 100

rag:
  checkpoint_duration: "30d"
  storage_path: ".rag_storage"
  cross_channel: []
  slack: []
  embedding_dim: 384
